# NoVA Kids — approved event sources
# -----------------------------------------------------------------------
# Rules:
#  - Only list original/public sources with explicit public event feeds.
#  - DullesMoms is NOT a data source; never add it here.
#  - When enabled is false the scraper is skipped during pipeline runs.
#  - source_type values: rss | html | api | ical
# -----------------------------------------------------------------------

sources:
  - id: fairfax_park_authority
    name: Fairfax County Park Authority
    source_type: html
    base_url: https://www.fairfaxcounty.gov/parks/park-events-calendar
    enabled: true
    notes: >
      Drupal Views events calendar. Paginated via ?park-events-calendar=&page=N.
      Stops when no a[rel='next'] link is present.

  - id: arlington_parks_rec
    name: Arlington County Parks & Recreation
    source_type: html
    base_url: https://www.arlingtonva.us/Government/Departments/Parks-Recreation/Parks-Events
    enabled: true
    notes: >
      Sitecore CMS. Only page 1 (~10 events) is accessible via GET.
      Pagination uses encrypted __SEAMLESSVIEWSTATE — cannot be driven externally.
      Akamai blocks browser UAs; pipeline UA (NoVAKidsPipeline/1.0) is allowed.

  - id: fairfax_county_library
    name: Fairfax County Public Library
    source_type: api
    base_url: https://librarycalendar.fairfaxcounty.gov/ajax/calendar/list
    enabled: true
    notes: >
      LibCal (SpringShare) AJAX API. Calendar ID 6524.
      Audience IDs: 2185 (School Age), 2186 (Preschoolers), 2187 (Babies/Toddlers).
      Requires X-Requested-With: XMLHttpRequest header.

  - id: arlington_public_library
    name: Arlington Public Library
    source_type: api
    base_url: https://arlingtonva.libcal.com/ajax/calendar/list
    enabled: true
    notes: >
      LibCal (SpringShare) AJAX API. Calendar ID 12881.
      Audience IDs: 176 (Babies/Preschoolers), 177 (Elementary), 173 (Families).
      Requires X-Requested-With: XMLHttpRequest header.

  - id: eventbrite_nova_family
    name: Eventbrite — Northern Virginia Family Events
    source_type: api
    base_url: https://www.eventbrite.com/d/va--northern-virginia/family-events/
    enabled: false
    notes: >
      Eventbrite public search results for NoVA family events.
      Disabled by default; enable when an Eventbrite API key is configured
      via EVENTBRITE_API_KEY environment variable.
      Only ingest events where is_free or relevant family categories apply.
