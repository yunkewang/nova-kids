name: NoVA Kids Pipeline

on:
  # Run daily at 10:00 UTC (6 AM ET)
  schedule:
    - cron: '0 10 * * *'

  # Manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — run pipeline but do not commit changes'
        required: false
        default: 'false'
        type: boolean

# Only one pipeline run at a time
concurrency:
  group: nova-kids-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    name: Scrape, enrich, and publish
    runs-on: ubuntu-latest

    permissions:
      contents: write   # required to commit + push back to main

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Python
      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Print environment
        run: |
          echo "Trigger : ${{ github.event_name }}"
          echo "Dry run : ${{ inputs.dry_run || 'false' }}"
          python --version
          pip show requests pydantic beautifulsoup4 PyYAML | grep -E "^(Name|Version)"

      # -----------------------------------------------------------------------
      # 3. Run the pipeline
      # -----------------------------------------------------------------------
      - name: Run pipeline
        run: python scripts/run_pipeline.py --enrich-geo

      # -----------------------------------------------------------------------
      # 4. Validate output — fail fast if scrapers returned nothing
      #
      #    publish_events() always writes a week file, even for 0 events.
      #    Without this guard a broken scraper run would silently overwrite
      #    good published data with an empty file.
      # -----------------------------------------------------------------------
      - name: Validate published output
        run: |
          python3 - <<'EOF'
          import json, sys
          from pathlib import Path

          index_path = Path("data/published/events/index.json")
          if not index_path.exists():
              print("ERROR: index.json not found — pipeline did not publish.")
              sys.exit(1)

          index = json.loads(index_path.read_text())
          latest = index.get("latest_week", "")
          week_path = Path(f"data/published/events/week-{latest}.json")
          if not week_path.exists():
              print(f"ERROR: week file {week_path.name} not found.")
              sys.exit(1)

          data = json.loads(week_path.read_text())
          count = data.get("event_count", 0)
          print(f"Latest week  : {latest}")
          print(f"Event count  : {count}")

          # Require at least 100 events before allowing a commit.
          # Pipeline now scrapes 6 sources; 100 is a safe floor that catches
          # total scraper failures while allowing for genuinely quiet weeks.
          MIN_EVENTS = 100
          if count < MIN_EVENTS:
              print(f"FAIL: only {count} events published (minimum {MIN_EVENTS}).")
              print("Pipeline output will NOT be committed to protect existing data.")
              sys.exit(1)

          print(f"OK: {count} events — safe to commit.")
          EOF

      # -----------------------------------------------------------------------
      # 5. Detect whether tracked files actually changed
      # -----------------------------------------------------------------------
      - name: Check for changes
        id: changes
        run: |
          git add \
            data/published/events/ \
            public/events/ \
            data/cache/geocode_cache.json

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes — data is already up to date."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            git diff --cached --stat
          fi

      # -----------------------------------------------------------------------
      # 6. Commit and push (skipped on dry run or when nothing changed)
      # -----------------------------------------------------------------------
      - name: Commit and push
        if: >
          steps.changes.outputs.changed == 'true' &&
          (github.event_name == 'schedule' ||
           (github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true'))
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          N=$(git diff --cached --name-only | wc -l | tr -d ' ')
          git commit -m "chore: auto-update NoVA Kids event data [skip ci]

          Triggered by: ${{ github.event_name }}
          Files changed: ${N}"

          git push origin main
          echo "Pushed ${N} changed file(s) to main."

      # -----------------------------------------------------------------------
      # 7. Summary (always runs so we get output even on failure)
      # -----------------------------------------------------------------------
      - name: Summary
        if: always()
        run: |
          echo "Trigger  : ${{ github.event_name }}"
          echo "Changed  : ${{ steps.changes.outputs.changed || 'n/a' }}"
          if [ -d data/published/events ]; then
            echo ""
            echo "Published files:"
            ls -lh data/published/events/
          fi

      # -----------------------------------------------------------------------
      # 8. Upload published JSON as a workflow artifact (7-day retention)
      # -----------------------------------------------------------------------
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nova-kids-pipeline-${{ github.run_number }}
          retention-days: 7
          if-no-files-found: ignore
          path: |
            data/published/events/
            data/manual_review/suspicious_geocodes.json
